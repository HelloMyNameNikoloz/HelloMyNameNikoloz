<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" fill="none" role="img" aria-label="Most used languages">
  <style>
    .sans { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .num { font-variant-numeric: tabular-nums; }
    .up { opacity: 0; animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.20s; }
    .d3 { animation-delay: 0.35s; }
    .d4 { animation-delay: 0.50s; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) { .up { animation: none; opacity: 1; } }
</style>
  <rect x="0.5" y="0.5" width="494" height="194" rx="15.5" fill="#101914" stroke="#30362f"/>
  <text class="sans up d1" x="24" y="40" font-size="15" font-weight="600" letter-spacing="0.5" fill="#e8bc66">Most used languages</text>
  <clipPath id="bar"><rect x="24" y="58" width="447" height="10" rx="5"/></clipPath>
  <rect class="up d2" x="24" y="58" width="447" height="10" rx="5" fill="#1d2a20"/>
  <rect class="up d2" x="24.0" y="58" width="164.2" height="10" fill="#e8bc66" clip-path="url(#bar)"/>
  <rect class="up d2" x="188.2" y="58" width="94.9" height="10" fill="#d7a84f" clip-path="url(#bar)"/>
  <rect class="up d2" x="283.1" y="58" width="60.1" height="10" fill="#9aa84f" clip-path="url(#bar)"/>
  <rect class="up d2" x="343.2" y="58" width="48.7" height="10" fill="#8fae72" clip-path="url(#bar)"/>
  <rect class="up d2" x="391.9" y="58" width="20.0" height="10" fill="#5c7a3f" clip-path="url(#bar)"/>
  <rect class="up d2" x="411.9" y="58" width="13.4" height="10" fill="#33532f" clip-path="url(#bar)"/>
  <circle class="up d3" cx="30" cy="98" r="4" fill="#e8bc66"/>
  <text class="sans up d3" x="44" y="102" font-size="13" fill="#f4ead7" opacity="0.85">HTML</text>
  <text class="sans num up d3" x="214" y="102" text-anchor="end" font-size="12.5" fill="#f4ead7" opacity="0.5">36.7%</text>
  <circle class="up d3" cx="30" cy="125" r="4" fill="#d7a84f"/>
  <text class="sans up d3" x="44" y="129" font-size="13" fill="#f4ead7" opacity="0.85">Python</text>
  <text class="sans num up d3" x="214" y="129" text-anchor="end" font-size="12.5" fill="#f4ead7" opacity="0.5">21.2%</text>
  <circle class="up d3" cx="30" cy="152" r="4" fill="#9aa84f"/>
  <text class="sans up d3" x="44" y="156" font-size="13" fill="#f4ead7" opacity="0.85">JavaScript</text>
  <text class="sans num up d3" x="214" y="156" text-anchor="end" font-size="12.5" fill="#f4ead7" opacity="0.5">13.4%</text>
  <circle class="up d4" cx="270" cy="98" r="4" fill="#8fae72"/>
  <text class="sans up d4" x="284" y="102" font-size="13" fill="#f4ead7" opacity="0.85">CSS</text>
  <text class="sans num up d4" x="454" y="102" text-anchor="end" font-size="12.5" fill="#f4ead7" opacity="0.5">10.9%</text>
  <circle class="up d4" cx="270" cy="125" r="4" fill="#5c7a3f"/>
  <text class="sans up d4" x="284" y="129" font-size="13" fill="#f4ead7" opacity="0.85">TypeScript</text>
  <text class="sans num up d4" x="454" y="129" text-anchor="end" font-size="12.5" fill="#f4ead7" opacity="0.5">4.5%</text>
