  <text class="sans up d4" x="284" y="156" font-size="13" fill="#f4ead7" opacity="0.85">Kotlin</text>
  <text class="sans num up d4" x="454" y="156" text-anchor="end" font-size="12.5" fill="#f4ead7" opacity="0.5">3.0%</text>
