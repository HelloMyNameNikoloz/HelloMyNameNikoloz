<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" fill="none" role="img" aria-label="GitHub contribution streak for Nikoloz: 16 days current, 16 days longest">
  <style>
    .sans { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .num { font-variant-numeric: tabular-nums; }
    .up { opacity: 0; animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.20s; }
    .d3 { animation-delay: 0.35s; }
    .d4 { animation-delay: 0.50s; }
    .flame {
      opacity: 0;
      transform: scale(0.72);
      transform-box: fill-box;
      transform-origin: center bottom;
      animation: ignite 0.65s cubic-bezier(0.16, 1, 0.3, 1) 0.45s forwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes ignite {
      to { opacity: 1; transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .up, .flame { animation: none; opacity: 1; transform: none; }
    }
</style>
