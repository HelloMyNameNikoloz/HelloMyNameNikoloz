  <text class="sans up d3" x="44" y="156" font-size="13" fill="#f4ead7" opacity="0.85">C++</text>
  <text class="sans num up d3" x="214" y="156" text-anchor="end" font-size="12.5" fill="#f4ead7" opacity="0.5">11.3%</text>
  <circle class="up d4" cx="270" cy="98" r="4" fill="#8fae72"/>
  <text class="sans up d4" x="284" y="102" font-size="13" fill="#f4ead7" opacity="0.85">Elm</text>
  <text class="sans num up d4" x="454" y="102" text-anchor="end" font-size="12.5" fill="#f4ead7" opacity="0.5">9.6%</text>
  <circle class="up d4" cx="270" cy="125" r="4" fill="#5c7a3f"/>
  <text class="sans up d4" x="284" y="129" font-size="13" fill="#f4ead7" opacity="0.85">Python</text>
  <text class="sans num up d4" x="454" y="129" text-anchor="end" font-size="12.5" fill="#f4ead7" opacity="0.5">9.1%</text>
  <circle class="up d4" cx="270" cy="152" r="4" fill="#33532f"/>
  <text class="sans up d4" x="284" y="156" font-size="13" fill="#f4ead7" opacity="0.85">C#</text>
  <text class="sans num up d4" x="454" y="156" text-anchor="end" font-size="12.5" fill="#f4ead7" opacity="0.5">7.7%</text>
</svg>
